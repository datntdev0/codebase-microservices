<div class="relative">
  <div class="mx-auto px-5">
    <div class="flex items-center justify-between py-3.5 md:justify-start">
      <!-- Mobile Navigation Menu Button-->
      <div class="sm:order-1 md:hidden">
        <button
          (click)="layoutStore.toggleMobileMenu()"
          class="bg-muted text-muted-foreground focus:ring-primary hover:bg-muted-foreground hover:text-muted inline-flex items-center justify-center rounded-md p-2 focus:outline-hidden focus:ring-2 focus:ring-inset cursor-pointer">
          <span class="sr-only">Open menu</span>
          <i class="fa-solid fa-bars"></i>
        </button>
      </div>

      <!-- Logo -->
      <div class="flex items-center justify-start sm:order-2 md:mr-10 lg:hidden">
        <img class="h-[48px]" src="https://angular.dev/assets/images/press-kit/angular_icon_gradient.gif"/>
        <b class="ml-2 font-bold text-lg hidden sm:block">Microservice Angular</b>
      </div>

      <!-- Desktop Menu -->
      <div class="hidden space-x-10 sm:order-3 md:flex">
        <app-navbar-main-menu></app-navbar-main-menu>
      </div>

      <!-- Profile menu -->
      <div class="items-center justify-end sm:order-4 md:flex md:flex-1 lg:w-0">
        <app-navbar-user-menu></app-navbar-user-menu>
      </div>
    </div>
  </div>
  <!-- Mobile menu -->
  <app-navbar-mobile-menu></app-navbar-mobile-menu>
</div>
