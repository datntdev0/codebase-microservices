<nav [ngClass]="layoutStore.showSideBar ? 'w-[320px]' : 'w-[70px]'"
  class="scrollbar-thumb--sm scrollbar-track-rounded scrollbar-thin scrollbar-track-transparent scrollbar-thumb-card hidden h-full flex-col justify-between overflow-auto transition-all duration-300 lg:flex">
  <div class="px-4">
    <!-- Logo -->
    <div class="flex items-center justify-center py-2">
      <div class="flex grow items-center" *ngIf="layoutStore.showSideBar">
        <img class="h-[48px]" src="https://angular.dev/assets/images/press-kit/angular_icon_gradient.gif"/>
        <b class="ml-2 font-bold text-lg">Microservice Angular</b>
      </div>
      <button
        (click)="toggleSidebar()"
        class="h-[48px] text-muted-foreground/50 hover:text-muted-foreground rounded-sm transition-all duration-200 cursor-pointer"
        [ngClass]="{ 'rotate-180': !layoutStore.showSideBar }">
        <i class="fa-solid fa-angles-left"></i>
      </button>
    </div>

    <!-- Separator -->
    <hr class="border-muted border-dashed" />

    <!-- Menu Items -->
    <app-sidebar-main-menu></app-sidebar-main-menu>
  </div>
</nav>
