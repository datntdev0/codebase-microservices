<form #form="ngForm" (ngSubmit)="save()">
  <h2 mat-dialog-title>{{ "ChangeTenant" | localize }}</h2>
  <mat-dialog-content class="my-2">
    <mat-form-field appearance="outline" class="w-[300px] pt-1">
      <mat-label>{{ "TenancyName" | localize }}</mat-label>
      <input matInput [(ngModel)]="tenancyName" id="tenancyName" name="tenancyName" cdkFocusInitial />
      <mat-hint><i class="fa fa-info-circle"></i> {{ "LeaveEmptyToSwitchToHost" | localize }}</mat-hint>
    </mat-form-field>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button type="button" mat-button [mat-dialog-close]>{{ "Close" | localize }}</button>
    <button type="submit" mat-flat-button [disabled]="saving || !form.form.valid">{{ "Change" | localize }}</button>
  </mat-dialog-actions>
</form>
