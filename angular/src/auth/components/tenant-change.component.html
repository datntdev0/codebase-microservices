<div class="text-center" *ngIf="isMultiTenancyEnabled">
  <span>
    {{ "CurrentTenant" | localize }}:
    <span *ngIf="appSession.tenant?.tenancyName" title="{{ appSession.tenant.name }}">
      <strong>{{ appSession.tenant.tenancyName }}</strong>
    </span>
    <span *ngIf="!appSession.tenant?.tenancyName">
      {{ "NotSelected" | localize }}
    </span>
    (<button mat-button (click)="openModal()">
      {{ "Change" | localize }}
    </button>)
  </span>
</div>
